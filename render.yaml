services:
  - type: web
    name: lostfound
    env: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt ; python manage.py collectstatic --noinput ; python manage.py migrate
    startCommand: gunicorn --chdir lostfound lostfound.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.7
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: SECRET_KEY
        generateValue: true
