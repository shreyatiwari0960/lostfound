{% extends 'base.html' %}
{% block content %}

<div class="card p-4">

<h2>{{ item.title }}</h2>

{% if item.is_urgent %}
<span class="badge bg-warning">🚨 URGENT</span>
{% endif %}

<p>{{ item.description }}</p>
<p>📍 {{ item.location }}</p>

</div>

<hr>

<h4>Similar Items 🔍</h4>

<div class="row">
{% for m in matches %}
<div class="col-md-4">
<div class="card p-2 mb-3">
    <h6>{{ m.title }}</h6>
    <p>{{ m.location }}</p>
</div>
</div>
{% endfor %}
</div>

{% endblock %}
